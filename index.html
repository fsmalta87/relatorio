<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório — Falta de Água</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235;
    --border: rgba(99,179,237,0.12); --accent: #38bdf8; --accent2: #818cf8;
    --danger: #f87171; --warning: #fbbf24; --success: #34d399;
    --text: #e2e8f0; --muted: #64748b;
    --leste: #818cf8; --norte: #38bdf8; --central: #fbbf24;
    --oeste: #34d399; --sul: #f87171; --sem: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; padding: 24px; }
  .grid-bg { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
  .container { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 26px; font-weight: 600; color: #f1f5f9; line-height: 1.2; }
  .header-meta { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .header-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; text-align: right; }
  .header-stat-val { font-size: 22px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }
  .header-stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .dir-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .dir-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; position: relative; overflow: hidden; }
  .dir-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .dir-card.leste::before { background: var(--leste); }
  .dir-card.sul::before { background: var(--sul); }
  .dir-card.norte::before { background: var(--norte); }
  .dir-card.central::before { background: var(--central); }
  .dir-card.oeste::before { background: var(--oeste); }
  .dir-name { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
  .dir-card.leste .dir-name { color: var(--leste); }
  .dir-card.sul .dir-name { color: var(--sul); }
  .dir-card.norte .dir-name { color: var(--norte); }
  .dir-card.central .dir-name { color: var(--central); }
  .dir-card.oeste .dir-name { color: var(--oeste); }
  .dir-eventos { font-size: 28px; font-weight: 600; color: #f1f5f9; font-family: 'DM Mono', monospace; line-height: 1; }
  .dir-label { font-size: 11px; color: var(--muted); margin-top: 2px; margin-bottom: 8px; }
  .dir-municipio { font-size: 12px; color: var(--text); }
  .dir-municipio span { color: var(--muted); }
  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media(max-width:640px) { .main-grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; }
  .card-full { grid-column: 1 / -1; }
  .card-title { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .top10-list { display: flex; flex-direction: column; gap: 6px; }
  .top10-item { display: flex; align-items: center; gap: 8px; }
  .top10-rank { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); min-width: 18px; text-align: right; }
  .top10-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
  .top10-bar { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .top10-name { font-size: 12px; min-width: 130px; color: var(--text); }
  .top10-dir { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 500; }
  .top10-dir.norte { background: rgba(56,189,248,.12); color: var(--norte); }
  .top10-dir.central { background: rgba(251,191,36,.12); color: var(--central); }
  .top10-dir.oeste { background: rgba(52,211,153,.12); color: var(--oeste); }
  .top10-dir.leste { background: rgba(129,140,248,.12); color: var(--leste); }
  .top10-dir.sul { background: rgba(248,113,113,.12); color: var(--sul); }
  .top10-dir.sem { background: rgba(148,163,184,.12); color: var(--sem); }
  .top10-val { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); min-width: 70px; text-align: right; }
  .alert-list { display: flex; flex-direction: column; gap: 8px; }
  .alert-item { background: rgba(248,113,113,.06); border: 1px solid rgba(248,113,113,.15); border-radius: 8px; padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); margin-top: 3px; flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .alert-municipio { font-size: 13px; font-weight: 500; color: #fca5a5; }
  .alert-dur { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--danger); margin-top: 2px; }
  .alert-cat { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .no-alert { color: var(--success); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .rec-list { display: flex; flex-direction: column; gap: 8px; }
  .rec-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; }
  .rec-dir-tag { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; }
  .rec-dir-tag.norte { background: rgba(56,189,248,.12); color: var(--norte); }
  .rec-dir-tag.central { background: rgba(251,191,36,.12); color: var(--central); }
  .rec-dir-tag.oeste { background: rgba(52,211,153,.12); color: var(--oeste); }
  .rec-dir-tag.leste { background: rgba(129,140,248,.12); color: var(--leste); }
  .rec-dir-tag.sul { background: rgba(248,113,113,.12); color: var(--sul); }
  .rec-text { font-size: 12px; color: var(--text); line-height: 1.6; }
  .footer { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); flex-wrap: wrap; gap: 8px; }
  .footer-badge { background: rgba(56,189,248,.08); border: 1px solid rgba(56,189,248,.15); color: var(--accent); padding: 3px 10px; border-radius: 4px; font-size: 10px; font-weight: 600; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty h2 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
</style>
</head>

<script>
function parseTextoIA(texto) {
  const data = { gerado: new Date().toLocaleString('pt-BR'), totalEconomias: '0', diretorias: [], top10: [], alertas: [], recomendacoes: [] };
  const linhas = texto.split('\n');
  let section = '', totalEcon = 0;
  for (let i = 0; i < linhas.length; i++) {
    const l = linhas[i].trim();
    if (!l || l.startsWith('---')) continue;
    if (l.includes('RESUMO') || l.includes('DIRETORIA')) { section='dir'; continue; }
    if (l.includes('TOP 10') || l.includes('TOP10')) { section='top'; continue; }
    if (l.toUpperCase().includes('ALERT') && l.toUpperCase().includes('CR')) { section='alert'; continue; }
    if (l.includes('RECOMEND')) { section='rec'; continue; }
    if (section === 'dir') {
      const mDir = l.match(/^[\S]*\s*(Leste|Norte|Central|Oeste|Sul|Sem Diretoria)\s*[:\s]/i);
      if (mDir) {
        const nome = mDir[1], dk = dirClass(nome);
        let ev=0, econ=0, mun='', area='';
        for (let j=i+1; j<Math.min(i+8, linhas.length); j++) {
          const sub = linhas[j].trim();
          if (sub.startsWith('---') || /^[\S]*\s*(Leste|Norte|Central|Oeste|Sul|Sem)/i.test(sub)) break;
          if (!sub) continue;
          const mEv=sub.match(/[Ee]ventos?[:\s]+([\d]+)/), mEc=sub.match(/[Ee]conomias?[^:]*:[\s]*([-\d.,]+)/);
          const mMu=sub.match(/[Cc]r[íi]tico[^:]*:[\s]*([^(\n,]+)/), mAr=sub.match(/\(([\d.,]+%?)\)/);
          if (mEv) ev=parseInt(mEv[1]);
          if (mEc) econ=parseInt(mEc[1].replace(/\./g,'').replace(',',''));
          if (mMu) mun=mMu[1].trim();
          if (mAr) area=mAr[1];
        }
        data.diretorias.push({ id:dk, nome, dk, ev, eventos:ev, economias:econ.toLocaleString('pt-BR'), econ, municipio:mun, area });
        totalEcon += econ;
      }
    }
    if (section === 'top') {
      const clean = l.replace(/^[🔴•\-*\d.]+\s*/, '');
      const m = clean.match(/^(.+?)\s*\((.+?)\)\s*[—–-]+\s*([\d.,]+)\s*econ/i);
      if (m) { const econ=parseInt(m[3].replace(/\./g,'').replace(',','')); if(econ>0) data.top10.push({ nome:m[1].trim(), dir:m[2].trim(), dk:dirClass(m[2]), econ }); }
    }
    if (section === 'alert') {
      const clean = l.replace(/^[🔴⚠️•\-*]\s*/, '');
      if (clean.toLowerCase().includes('nenhum')) { data.alertas=[]; continue; }
      const parts = clean.split(/\s*[—–-]+\s*/);
      if (parts.length >= 2) data.alertas.push({ municipio:parts[0].trim(), duracao:parts[1]||'', categoria:parts[2]||'' });
    }
    if (section === 'rec') {
      const m = l.match(/^[\S]*\s*(Leste|Norte|Central|Oeste|Sul|Sem Diretoria)\s*[:\s]+(.+)/i);
      if (m) data.recomendacoes.push({ nome:m[1], dk:dirClass(m[1]), texto:m[2].trim() });
    }
  }
  data.totalEconomias = totalEcon.toLocaleString('pt-BR');
  return data;
}
function dirClass(d) {
  const m = {'norte':'norte','central':'central','oeste':'oeste','leste':'leste','sul':'sul'};
  return m[d?.toLowerCase().trim()] || 'sem';
}
