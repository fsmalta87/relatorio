<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falta de Água — Corsan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1e;--surface:#111827;--surface2:#1a2235;
    --border:rgba(99,179,237,0.12);--border2:rgba(99,179,237,0.06);
    --accent:#38bdf8;--text:#e2e8f0;--muted:#64748b;
    --danger:#f87171;--warning:#fbbf24;--success:#34d399;--purple:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;padding:24px}
  .grid-bg{position:fixed;inset:0;z-index:0;
    background-image:linear-gradient(rgba(56,189,248,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(56,189,248,0.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none}
  .container{max-width:960px;margin:0 auto;position:relative;z-index:1}

  /* Header */
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
  .header-left img{height:144px;margin-bottom:4px;margin-top:-8px;display:block;filter:brightness(0) invert(1)}
  h1{font-size:18px;font-weight:500;color:#f1f5f9}
  .header-meta{font-size:12px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}
  .header-stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;text-align:right}
  .header-stat-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
  .header-stat-label{font-size:11px;color:var(--muted);margin-top:2px}

  /* Metrics */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
  .metric-val{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
  .metric-label{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}

  /* IA subcards */
  .block{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px}
  .block-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .ia-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:600px){.ia-grid{grid-template-columns:1fr}}
  .ia-sub{border:0.5px solid rgba(255,255,255,.08);border-radius:8px;padding:12px 14px;background:rgba(255,255,255,.02)}
  .ia-sub.critico{border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.04)}
  .ia-sub.programado{border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.04)}
  .ia-sub.concluido{border-color:rgba(52,211,153,.25);background:rgba(52,211,153,.04)}
  .ia-sub.exec{grid-column:1/-1;border-color:rgba(56,189,248,.25);background:rgba(56,189,248,.04)}
  .ia-sub-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
  .ia-sub.critico .ia-sub-label{color:#f87171}
  .ia-sub.programado .ia-sub-label{color:#fbbf24}
  .ia-sub.concluido .ia-sub-label{color:#34d399}
  .ia-sub.exec .ia-sub-label{color:var(--accent)}
  .ia-sub-text{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap}

  /* Filtros */
  .filter-section{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .filter-label{font-size:11px;color:var(--muted);min-width:52px;flex-shrink:0}
  .fbtn{font-size:11px;padding:4px 10px;border:0.5px solid rgba(255,255,255,.15);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
  .fbtn.on{background:rgba(56,189,248,.1);color:var(--accent);border-color:rgba(56,189,248,.3)}
  .fbtn.on-danger{background:rgba(248,113,113,.1);color:#f87171;border-color:rgba(248,113,113,.3)}
  .fbtn.on-warning{background:rgba(251,191,36,.1);color:#fbbf24;border-color:rgba(251,191,36,.3)}
  .fbtn.on-success{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.3)}

  /* Dropdown */
  .dd-wrap{position:relative;flex:1;max-width:300px}
  .dd-input{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
  .dd-input:focus{border-color:var(--accent)}
  .dd-input::placeholder{color:var(--muted)}
  .dd-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;z-index:100;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .dd-list.open{display:block}
  .dd-opt{padding:7px 14px;font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px}
  .dd-opt:hover{background:var(--surface2)}
  .dd-opt.sel{color:var(--accent)}
  .dd-opt.sel::before{content:'✓';font-size:10px}
  .dd-opt:not(.sel)::before{content:'';display:inline-block;width:10px}
  .tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;min-height:4px}
  .tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;background:rgba(56,189,248,.1);border:0.5px solid rgba(56,189,248,.25);border-radius:4px;color:var(--accent)}
  .tag button{background:none;border:none;color:inherit;cursor:pointer;font-size:12px;padding:0;line-height:1}

  /* Status badges */
  .status-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
  .st-andamento{background:rgba(248,113,113,.12);color:#f87171}
  .st-recuperacao{background:rgba(251,191,36,.12);color:#fbbf24}
  .st-programado{background:rgba(56,189,248,.12);color:#38bdf8}
  .st-concluido{background:rgba(52,211,153,.12);color:#34d399}

  /* Lista eventos */
  .ev-item{display:flex;align-items:stretch;margin-bottom:6px;border-radius:8px;overflow:hidden;border:0.5px solid rgba(255,255,255,.06)}
  .ev-item.andamento{border-color:rgba(248,113,113,.2)}
  .ev-item.recuperacao{border-color:rgba(251,191,36,.2)}
  .ev-item.programado{border-color:rgba(56,189,248,.15)}
  .ev-item.concluido{border-color:rgba(52,211,153,.15)}
  .ev-acc{width:3px;flex-shrink:0}
  .ev-item.andamento .ev-acc{background:#f87171}
  .ev-item.recuperacao .ev-acc{background:#fbbf24}
  .ev-item.programado .ev-acc{background:#38bdf8}
  .ev-item.concluido .ev-acc{background:#34d399}
  .ev-body{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;flex:1;min-width:0;background:rgba(255,255,255,.02)}
  .ev-info{flex:1;min-width:0}
  .ev-municipio{font-size:12px;font-weight:500;color:#f1f5f9}
  .ev-categoria{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ev-datas{font-size:10px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace;line-height:1.6}
  .ev-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .ev-ligacoes{font-size:11px;font-family:'DM Mono',monospace;font-weight:500;color:#f1f5f9}
  .ev-ligacoes-label{font-size:9px;color:var(--muted)}

  /* Paginação */
  .pager{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:12px;color:var(--muted)}
  .pager-btns{display:flex;gap:6px}
  .pbtn{padding:4px 10px;border:0.5px solid rgba(255,255,255,.15);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:11px}
  .pbtn:disabled{opacity:.35;cursor:not-allowed}
  .pbtn:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}

  /* Cards regionais */
  .reg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
  @media(max-width:700px){.reg-grid{grid-template-columns:repeat(2,1fr)}}
  .reg-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .15s,background .15s}
  .reg-card:hover{border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.04)}
  .reg-card.active{border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.08)}
  .reg-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
  .reg-card.active .reg-name{color:var(--accent)}
  .reg-eventos{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;color:#f1f5f9}
  .reg-sub{font-size:10px;color:var(--muted);margin-top:2px;margin-bottom:8px}
  .reg-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
  .reg-mini{border-radius:5px;padding:5px 7px}
  .reg-mini-label{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
  .reg-mini-val{font-size:12px;font-weight:500;font-family:'DM Mono',monospace;color:#f1f5f9}

  .footer{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:8px}
  .footer-badge{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.15);color:var(--accent);padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600}
  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty h2{font-size:16px;color:#f1f5f9;margin-bottom:8px}
</style>
</head>

const JSON_URL = 'https://raw.githubusercontent.com/fsmalta87/relatorio-agua/main/dados-relatorio.json';
const POR_PAG = 20;

const STATUS_CFG = {
  'Em Andamento':   { cls: 'andamento',   badge: 'st-andamento',   label: 'Em Andamento' },
  'Em Recuperacao': { cls: 'recuperacao', badge: 'st-recuperacao', label: 'Em Recuperação' },
  'Programado':     { cls: 'programado',  badge: 'st-programado',  label: 'Programado' },
  'Concluido':      { cls: 'concluido',   badge: 'st-concluido',   label: 'Concluído' },
};

function getStatusCfg(status) {
  return STATUS_CFG[status] || { cls: 'programado', badge: 'st-programado', label: status };
}

function parseData(txt) {
  const data = { gerado: new Date().toLocaleString('pt-BR'), narracao: '', eventos: [] };
  const linhas = txt.split('\n');
  let section = 'dados';

  for (const l of linhas) {
    const lt = l.trim();
    if (!lt) continue;
    if (lt.includes('NARRAÇÃO') || lt.includes('NARRACAO')) { section = 'narracao'; continue; }
    if (lt.includes('DADOS')) { section = 'dados'; continue; }
    if (lt.startsWith('---')) { if (section === 'narracao') section = 'dados'; continue; }

    if (section === 'narracao') {
      data.narracao += (data.narracao ? '\n' : '') + lt;
      continue;
    }

    if (lt.startsWith('[') || lt.startsWith('{')) {
      try {
        const parsed = JSON.parse(lt.replace(/,$/, ''));
        const arr = Array.isArray(parsed) ? parsed : [parsed];
        for (const obj of arr) {
          if (!obj.status && !obj.STATUS) continue;
          data.eventos.push({
            id:          obj.id || obj.ID_EVENTO || '',
            categoria:   (obj.categoria || obj.CATEGORIA || '').trim(),
            subcategoria:(obj.subcategoria || obj.SUBCATEGORIA || '').trim(),
            status:      (obj.status || obj.STATUS || '').trim(),
            municipio:   (obj.municipio || obj.MUNICIPIOS || '').trim(),
            bairros:     (obj.bairros || obj.BAIRROS || '').trim(),
            dt_inicio:   obj.dt_inicio || obj.DT_INICIO || '',
            dt_inicio_rec: obj.dt_inicio_rec || obj.DT_INICIO_REC_GRAD || '',
            dt_fim_rec:  obj.dt_fim_rec || obj.DT_FIM_REC_GRAD || '',
            ligacoes:    parseInt(obj.ligacoes || obj.LIGACOES || 0) || 0,
            regional:    getRegional(obj.municipio || obj.MUNICIPIOS || ''),
          });
        }
      } catch(e) { continue; }
    }
  }
  return data;
}

function renderNarracao(txt) {
  if (!txt || !txt.trim()) return '';
  const blocos = [
    { key: ['🔴', 'SITUAÇÃO CRÍTICA', 'CRITICA'], cls: 'critico' },
    { key: ['📅', 'PROGRAMADOS', 'PROGRAMADO'], cls: 'programado' },
    { key: ['✅', 'CONCLUÍDO', 'CONCLUIDOS'], cls: 'concluido' },
    { key: ['📋', 'LEITURA EXECUTIVA'], cls: 'exec' },
  ];
  const linhas = txt.split('\n');
  let atual = null; let atualBloco = null;
  const enc = {};
  for (const l of linhas) {
    const lt = l.trim(); if (!lt) continue;
    let matched = false;
    for (const b of blocos) {
      if (b.key.some(k => lt.startsWith(k) || lt.toUpperCase().startsWith(k.toUpperCase()))) {
        atual = b.cls; atualBloco = b;
        if (!enc[atual]) enc[atual] = { label: lt, texto: [], bloco: b };
        matched = true; break;
      }
    }
    if (!matched && atual && enc[atual]) enc[atual].texto.push(lt);
  }
  const ordem = ['critico', 'programado', 'concluido', 'exec'];
  const html = ordem.map(cls => {
    const b = enc[cls]; if (!b) return '';
    return `<div class="ia-sub ${cls}"><div class="ia-sub-label">${b.label}</div><div class="ia-sub-text">${b.texto.join('\n')}</div></div>`;
  }).join('');
  return html ? `<div class="ia-grid">${html}</div>` : `<div style="font-size:13px;color:var(--muted);white-space:pre-wrap;line-height:1.7">${txt}</div>`;
}

let eventos_global = [];
let filtStatus = 'todos';
let filtMunicipio = 'todos';
let filtRegional = 'todas';
let pagina = 1;

function filtrarEventos() {
  return eventos_global
    .filter(e =>
      (filtStatus === 'todos' || e.status === filtStatus) &&
      (filtRegional === 'todas' || e.regional === filtRegional) &&
      (filtMunicipio === 'todos' || e.municipio === filtMunicipio)
    )
    .sort((a, b) => {
      const ordem = { 'Em Andamento': 0, 'Em Recuperacao': 1, 'Programado': 2, 'Concluido': 3 };
      const oa = ordem[a.status] ?? 4;
      const ob = ordem[b.status] ?? 4;
      if (oa !== ob) return oa - ob;
      return (b.ligacoes || 0) - (a.ligacoes || 0);
    });
}

function calcRegional(eventos, reg) {
  const sub = reg === 'todas' ? eventos : eventos.filter(e => e.regional === reg);
  const ativos = sub.filter(e => ['Em Andamento','Em Recuperacao'].includes(e.status));
  return {
    total: sub.length,
    ativos: ativos.length,
    programados: sub.filter(e => e.status === 'Programado').length,
    concluidos: sub.filter(e => e.status === 'Concluido').length,
    ligacoes: ativos.reduce((s, e) => s + (e.ligacoes || 0), 0),
  };
}

function renderRegCards(eventos) {
  const el = document.getElementById('reg-cards');
  if (!el) return;
  const regs = ['CENTRO','LESTE','NORTE','OESTE','SUL'];
  el.innerHTML = regs.map(reg => {
    const s = calcRegional(eventos, reg);
    const nome = reg;
    const mono = 'DM Mono,monospace';
    function mini(bg, border, cor, titulo, valor) {
      return '<div class="reg-mini" style="background:' + bg + ';border:0.5px solid ' + border + '">' +
        '<div class="reg-mini-label" style="color:' + cor + '">' + titulo + '</div>' +
        '<div class="reg-mini-val">' + valor + '</div></div>';
    }
    return '<div class="reg-card' + (filtRegional===reg?' active':'') + '" onclick="filtrarRegional(\'' + reg + '\')">' +
      '<div class="reg-name">' + nome + '</div>' +
      '<div class="reg-sub" style="margin-bottom:6px">' + s.total + ' eventos · ' + s.ligacoes.toLocaleString('pt-BR') + ' lig.</div>' +
      '<div class="reg-mini-grid">' +
        mini('rgba(248,113,113,.08)', 'rgba(248,113,113,.2)', '#f87171', 'Ativos',      s.ativos) +
        mini('rgba(251,191,36,.08)',  'rgba(251,191,36,.2)',  '#fbbf24', 'Program.',    s.programados) +
        mini('rgba(52,211,153,.08)',  'rgba(52,211,153,.2)',  '#34d399', 'Concluídos',  s.concluidos) +
        mini('rgba(56,189,248,.08)',  'rgba(56,189,248,.2)',  '#38bdf8', 'Ligações',    s.ligacoes.toLocaleString('pt-BR')) +
      '</div>' +
    '</div>';
  }).join('');
}

function filtrarRegional(reg) {
  filtRegional = reg;
  pagina = 1;
  document.querySelectorAll('.fbtn[data-reg]').forEach(b => {
    b.className = 'fbtn' + (b.dataset.reg === reg ? ' on' : '');
  });
  document.querySelectorAll('.reg-card').forEach(el => {
    const onclick = el.getAttribute('onclick') || '';
    el.classList.toggle('active', onclick.includes("'" + reg + "'"));
  });
  renderEventos();
}

function selecionarStatus(s) {
  filtStatus = s;
  pagina = 1;
  document.querySelectorAll('.fbtn[data-status]').forEach(b => {
    const cfg = getStatusCfg(b.dataset.status);
    b.className = 'fbtn' + (b.dataset.status === s ? ' on' + (s === 'todos' ? '' : s === 'Em Andamento' ? '-danger' : s === 'Em Recuperacao' ? '-warning' : s === 'Programado' ? '' : '-success') : '');
    if (b.dataset.status === s && s === 'todos') b.className = 'fbtn on';
  });
  renderEventos();
}

function handleMunicipio(el) {
  filtMunicipio = el.dataset.municipio;
  document.querySelectorAll('.dd-opt[data-municipio]').forEach(o => o.classList.toggle('sel', o.dataset.municipio === filtMunicipio));
  const inp = document.getElementById('municipioInput');
  if (inp) inp.value = filtMunicipio === 'todos' ? '' : filtMunicipio;
  fecharDD('municipioDD');
  atualizarTag();
  pagina = 1;
  renderEventos();
}

function limparMunicipio() {
  filtMunicipio = 'todos';
  const inp = document.getElementById('municipioInput'); if (inp) inp.value = '';
  document.querySelectorAll('.dd-opt[data-municipio]').forEach(o => o.classList.toggle('sel', o.dataset.municipio === 'todos'));
  atualizarTag();
  pagina = 1; renderEventos();
}

function atualizarTag() {
  const t = document.getElementById('municipioTag'); if (!t) return;
  t.innerHTML = filtMunicipio === 'todos' ? '' :
    `<span class="tag">${filtMunicipio}<button onclick="limparMunicipio()">×</button></span>`;
}

function toggleDD(id) { document.getElementById(id)?.classList.toggle('open'); }
function fecharDD(id) { document.getElementById(id)?.classList.remove('open'); }
function filterDD(id, val) {
  document.getElementById(id)?.classList.add('open');
  document.querySelectorAll(`#${id} .dd-opt`).forEach(o => {
    o.style.display = (o.dataset.municipio === 'todos' || (o.textContent || '').toLowerCase().includes(val.toLowerCase())) ? '' : 'none';
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.dd-wrap')) document.querySelectorAll('.dd-list').forEach(d => d.classList.remove('open'));
});

function renderEventos() {
  const lista = filtrarEventos();
  const total = lista.length;
  const inicio = (pagina - 1) * POR_PAG;
  const pag = lista.slice(inicio, inicio + POR_PAG);
  const totalPags = Math.ceil(total / POR_PAG) || 1;

  document.getElementById('ev-count').textContent = total + ' eventos';
  document.getElementById('ev-list').innerHTML = pag.length === 0
    ? '<p style="font-size:13px;color:var(--muted);padding:12px 0">Nenhum evento no filtro selecionado.</p>'
    : pag.map(e => {
        const cfg = getStatusCfg(e.status);
        return '<div class="ev-item ' + cfg.cls + '">' +
          '<div class="ev-acc"></div>' +
          '<div class="ev-body">' +
            '<div class="ev-info">' +
              '<div class="ev-municipio">' +
                (e.regional ? '<span style="font-size:9px;color:var(--muted);display:block;line-height:1.2;text-transform:uppercase;letter-spacing:.06em">' + e.regional + '</span>' : '') +
                (e.municipio || '—') +
              '</div>' +
              '<div class="ev-categoria">' + e.categoria + '</div>' +
              '<div class="ev-datas">Início: ' + (e.dt_inicio || '—') + (e.dt_fim_rec ? ' · Normalização: ' + e.dt_fim_rec : '') + '</div>' +
            '</div>' +
            '<div class="ev-right">' +
              '<span class="status-badge ' + cfg.badge + '">' + cfg.label + '</span>' +
              (e.ligacoes > 0 ? '<span class="ev-ligacoes">' + e.ligacoes.toLocaleString('pt-BR') + '</span><span class="ev-ligacoes-label">ligações</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');

  document.getElementById('pager-info').textContent = 'Página ' + pagina + ' de ' + totalPags + ' · ' + total + ' registros';
  document.getElementById('btn-prev').disabled = pagina <= 1;
  document.getElementById('btn-next').disabled = pagina >= totalPags;
}

  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
  .then(txt => {
    if (!txt || !txt.trim()) throw new Error('Arquivo vazio');
    const data = parseData(txt);
    if (!data.eventos.length) throw new Error('Nenhum evento encontrado — verifique o arquivo JSON');
    render(data);
  })
  .catch(err => {
    document.getElementById('app').innerHTML =
      `<div class="empty"><h2>Erro ao carregar</h2>
       <p style="font-size:13px;margin-top:6px">${err.message}</p>
       <p style="font-size:11px;margin-top:8px;color:var(--muted)">URL: ${JSON_URL}</p></div>`;
  });
</script>
</body>
</html>
